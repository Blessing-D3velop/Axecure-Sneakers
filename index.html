<!DOCTYPE html>
<html>
  <head>
    <title>Axecure Sneakers</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
     <link rel="stylesheet" href="styles/header.css"/>
     <link rel="stylesheet" href="Styles/home-section.css">
     <link rel="stylesheet" href="Styles/featured-section.css">
  </head>
  <body>
    <header>
      <div class="left-section">
      <img src="Images & Icons/Icons/icons8-a-50.png" alt="icon"/>
      <h1 class="heading-one"><span class="axecure">Axecure</span> <span class="sneakers">Sneakers</span></h1>
      </div>
       <nav>
        <p class="home" id="js-home-id">Home</p>
        <p class="shop" id="js-shop-id">Shop</p>
        <p class="about" id="js-about-id">About</p>
        <p class="contact" id="js-contact-id">Contact</p>
      </nav>
    </header>
      <main>
        <section class="home-section">
          <div class="home-left-section">
            <h1 class="home-heading-one">Step into</h1>
            <h2 class="home-heading-two">Confidence</h2>
            <p class="home-description">Premium sneakers from Zimbabwe</p>
            <div class="buttons-container-one">
              <button class="shop-now-button">
                Shop Now
                <img src="Images & Icons/Icons/icons8-right-arrow-48.png" alt="right arrow icon"/>
              </button>
              <button class="view-collection-button">
                View Collection
              </button>
            </div>
          </div>
          <div>
            <img src="Images & Icons/Images/AXC-01 Runner.jpg" class="home-section-image" alt="image">
          </div>
        </section>

        <section class="featured-section">
          <div class="text-one">
            <h3 class="featured-collection-text">Featured Collection</h3>
            <p class="featured-description">Discover our carefully curated selection of premium sneakers</p>
          </div>
        </section>
      </main>
    <script></script>
  </body>
</html>
